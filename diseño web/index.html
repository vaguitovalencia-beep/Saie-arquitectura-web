<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CONFIGURACIÓN PARA COMPARTIR EN WHATSAPP -->
    <title>SAIE Educación - LISP Master Suite 2026</title>
    <meta name="description" content="Domina la automatización arquitectónica con nuestra Suite LISP exclusiva.">
    <meta property="og:title" content="SAIE Educación - LISP Expert Suite">
    <meta property="og:description" content="6 Herramientas de alto poder para AutoCAD.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80&w=1000">
    <meta property="og:type" content="website">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: white;
            margin: 0; 
            overflow: hidden; 
        }

        .slide-enter { animation: slideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .command-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* Estilo para el estado de carga inicial */
        #loader {
            display: flex;
            height: 100vh;
            width: 100vw;
            align-items: center;
            justify-content: center;
            background-color: #020617;
            color: #3b82f6;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="loader">Cargando SAIE Suite...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, className }) => {
            useEffect(() => { 
                try {
                    if (window.lucide) {
                        window.lucide.createIcons(); 
                    }
                } catch (e) {
                    console.error("Error al cargar iconos:", e);
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            const extensions = [
                {
                    id: "wall-engine",
                    command: "GM",
                    title: "Architectural Wall Engine",
                    subtitle: "ADN Arquitectónico Inteligente",
                    description: "No dibujes líneas, crea componentes con 'consciencia'. Este motor inyecta metadatos BIM (XData) en cada muro, permitiendo que tu dibujo sepa exactamente qué es antes de ser cuantificado.",
                    benefit: "Muros paramétricos que gestionan capas y datos automáticamente.",
                    icon: "box",
                    img: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000"
                },
                {
                    id: "surface-matrix",
                    command: "QA",
                    title: "Surface Matrix Quantifier",
                    subtitle: "Presupuestos de Alta Ingeniería",
                    description: "El fin de los errores en cuantificación. Lee la inteligencia del Wall Engine para generar matrices de pintura, repellado y acabados con precisión absoluta, directo a Excel.",
                    benefit: "Cálculo instantáneo de áreas en ambas caras y longitudes totales.",
                    icon: "calculator",
                    img: "https://images.unsplash.com/photo-1503387762-592dea58ef23?q=80&w=2000"
                },
                {
                    id: "inventory-master",
                    command: "CQ",
                    title: "Global Inventory Master",
                    subtitle: "Auditoría Total en un Clic",
                    description: "Escaneo profundo de tu proyecto. Identifica mobiliario y bloques dinámicos al instante, generando inventarios alfabéticos perfectos para tablas de costos y suministros.",
                    benefit: "Inventarios automáticos que eliminan el error humano en el conteo.",
                    icon: "list-checks",
                    img: "https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&w=2000"
                },
                {
                    id: "area-surveyor",
                    command: "AU",
                    title: "Precision Area Surveyor",
                    subtitle: "La Estética de la Precisión",
                    description: "Lleva la limpieza de tus planos a otro nivel. Define jerarquías visuales y ubica etiquetas de área con libertad total, garantizando una presentación impecable y técnica.",
                    benefit: "Control total sobre la ubicación y estética de los datos geométricos.",
                    icon: "layout",
                    img: "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2000"
                },
                {
                    id: "stair-modeler",
                    command: "EE",
                    title: "Blondel-Standard Stair Modeler",
                    subtitle: "Ingeniería Vertical Automatizada",
                    description: "Matemática aplicada al diseño. Utiliza la Ley de Blondel para proyectar escaleras perfectas, con tramos, numeración y simbología técnica generada en segundos.",
                    benefit: "Cálculo ergonómico automático para tramos rectos, en L o en U.",
                    icon: "layers",
                    img: "https://images.unsplash.com/photo-1518005020251-582c7897655d?q=80&w=2000"
                },
                {
                    id: "structural-designer",
                    command: "DC",
                    title: "Structural Core Designer",
                    subtitle: "Rigor Normativo NTC",
                    description: "Ingeniería estructural dentro de tu CAD. Realiza pre-dimensionamientos basados en las NTC y genera detalles constructivos de armado con varillas y estribos escalados.",
                    benefit: "Generación de memorias de cálculo y detalles constructivos al instante.",
                    icon: "shield",
                    img: "https://images.unsplash.com/photo-1621905252507-b354bcadcabc?q=80&w=2070"
                }
            ];

            const slides = [
                { type: "cover" },
                ...extensions.map(ext => ({ ...ext, type: "extension" })),
                { type: "summary" }
            ];

            const next = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prev = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);

            const renderSlide = () => {
                const slide = slides[currentSlide];
                if (slide.type === "cover") {
                    return (
                        <div className="flex flex-col items-center justify-center h-full text-white text-center p-8 slide-enter">
                            <div className="mb-12 p-8 glass rounded-[2.5rem] shadow-2xl border-blue-500/20">
                                <img 
                                    src="https://raw.githubusercontent.com/saie-arquitectura/assets/main/logo_saie.png" 
                                    alt="Logo SAIE" 
                                    className="w-56 md:w-72 h-auto"
                                    onError={(e) => { e.target.src = 'https://via.placeholder.com/300x120?text=SAIE+EDUCACION'; }}
                                />
                            </div>
                            <h1 className="text-6xl md:text-8xl font-black mb-6 tracking-tighter leading-none italic uppercase">
                                LISP <span className="gradient-text">MASTER SUITE</span>
                            </h1>
                            <p className="text-xl md:text-3xl text-slate-400 font-light max-w-3xl mx-auto mb-16">
                                Herramientas de automatización de alto nivel creadas por <span className="text-white font-bold">SAIE Educación</span>.
                            </p>
                            <div className="flex gap-4">
                                <div className="px-8 py-3 bg-blue-600 rounded-2xl font-bold text-sm tracking-widest shadow-lg shadow-blue-500/20">EDICIÓN 2026</div>
                            </div>
                        </div>
                    );
                }

                if (slide.type === "extension") {
                    return (
                        <div className="flex flex-col md:flex-row h-full text-white slide-enter overflow-hidden">
                            <div className="flex-1 p-8 md:p-20 flex flex-col justify-center bg-slate-950/90 z-10 border-r border-white/5">
                                <div className="flex items-center gap-6 mb-10">
                                    <div className="w-20 h-20 glass rounded-3xl flex items-center justify-center shadow-2xl border-blue-500/30">
                                        <Icon name={slide.icon} className="w-10 h-10 text-blue-400" />
                                    </div>
                                    <div>
                                        <div className="mb-2">
                                            <span className="command-badge px-4 py-1 text-sm font-black rounded-lg">COMANDO: {slide.command}</span>
                                        </div>
                                        <h2 className="text-4xl md:text-5xl font-black tracking-tight leading-none">{slide.title}</h2>
                                    </div>
                                </div>
                                
                                <h3 className="text-blue-400 text-xl font-bold uppercase tracking-widest mb-6">{slide.subtitle}</h3>
                                
                                <p className="text-slate-300 text-2xl mb-12 leading-relaxed font-light border-l-4 border-blue-600 pl-10">
                                    {slide.description}
                                </p>

                                <div className="glass p-8 rounded-3xl border-white/5">
                                    <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Poder de la herramienta:</p>
                                    <p className="text-xl font-bold text-white italic">
                                        "{slide.benefit}"
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative bg-black">
                                <img 
                                    src={slide.img} 
                                    className="w-full h-full object-cover opacity-40" 
                                    alt={slide.title}
                                    onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2000'; }}
                                />
                                <div className="absolute inset-0 bg-gradient-to-r from-slate-950 via-transparent to-transparent"></div>
                                <div className="absolute bottom-10 right-10 text-right">
                                    <p className="text-sm font-black text-blue-500 tracking-[0.3em] uppercase">SAIE System Engine</p>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="h-full flex items-center justify-center text-center p-8 slide-enter">
                        <div className="max-w-4xl">
                            <Icon name="rocket" className="w-20 h-20 text-blue-500 mx-auto mb-10 animate-bounce" />
                            <h2 className="text-5xl md:text-7xl font-black text-white mb-8">
                                TRABAJA COMO UN <span className="gradient-text">EXPERTO.</span>
                            </h2>
                            <p className="text-2xl text-slate-400 mb-16 font-light">
                                Estas extensiones son el resultado de años de experiencia técnica. Únete a <span className="text-white font-bold">SAIE Educación</span> y domina la tecnología.
                            </p>
                            <button className="px-14 py-6 bg-white text-black font-black text-xl rounded-3xl hover:bg-blue-500 hover:text-white transition-all transform hover:scale-105 shadow-2xl active:scale-95">
                                ACCEDER A LA BIBLIOTECA
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-full h-screen flex flex-col bg-slate-950">
                    <div className="flex-1 overflow-hidden relative">
                        {renderSlide()}
                    </div>
                    
                    <div className="h-24 bg-slate-900 border-t border-white/5 flex items-center justify-between px-8 md:px-24">
                        <div className="flex items-center gap-12">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">Status</span>
                                <span className="text-sm font-black text-white uppercase tracking-tighter">LISP Master Suite V2.0</span>
                            </div>
                            <div className="hidden lg:flex gap-2">
                                {slides.map((_, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => setCurrentSlide(i)}
                                        className={`h-1.5 rounded-full transition-all duration-700 cursor-pointer ${i === currentSlide ? 'w-16 bg-blue-500' : 'w-4 bg-slate-700 hover:bg-slate-600'}`}
                                    ></div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="flex gap-4">
                            <button onClick={prev} className="p-4 text-slate-400 hover:text-white glass rounded-2xl"><Icon name="chevron-left" className="w-8 h-8" /></button>
                            <button onClick={next} className="bg-white p-4 rounded-2xl text-black px-12 font-black text-lg hover:bg-blue-500 hover:text-white transition-all flex items-center gap-3">
                                SIGUIENTE <Icon name="chevron-right" className="w-6 h-6" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
